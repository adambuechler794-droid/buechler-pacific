    <circle cx="20" cy="20" r="3.5" fill="#60a5fa"/>
    <circle cx="8" cy="12" r="2.5" fill="#60a5fa" opacity="0.7"/>
    <circle cx="32" cy="12" r="2.5" fill="#60a5fa" opacity="0.7"/>
    <circle cx="8" cy="28" r="2.5" fill="#60a5fa" opacity="0.4"/>
