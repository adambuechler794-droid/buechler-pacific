  <!-- Wordmark -->
  <text x="280" y="308" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-weight="700" font-size="68" fill="#f1f5f9" letter-spacing="-1">Buechler Pacific</text>
  <text x="284" y="362" font-family="'DM Sans', system-ui, -apple-system, sans-serif" font-weight="400" font-size="26" fill="#64748b">AI Systems for Finance</text>

