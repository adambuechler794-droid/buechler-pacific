<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#2563eb"/>

  <!-- Ghost node mark — decorative background, right side -->
  <g transform="translate(680, 35) scale(14)" opacity="0.05">
    <circle cx="20" cy="20" r="3.5" fill="#60a5fa"/>
    <circle cx="8" cy="12" r="2.5" fill="#60a5fa"/>
    <circle cx="32" cy="12" r="2.5" fill="#60a5fa"/>
    <circle cx="8" cy="28" r="2.5" fill="#60a5fa"/>
