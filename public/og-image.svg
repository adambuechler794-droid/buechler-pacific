    <line x1="10" y1="13" x2="17.5" y2="18" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="30" y1="13" x2="22.5" y2="18" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="10" y1="27" x2="17.5" y2="22" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="30" y1="27" x2="22.5" y2="22" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

